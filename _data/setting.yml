# Book Information
book:
  title: "Navigate the World of HCI Research"
  subtitle: "A Fresh Researcher's Roadmap"
  author: "Prof. Zhao Shengdong"
  publisher: "City University of Hong Kong"
  date: "October 2025"
  cover: "/assets/img/book-cover.svg"
  description: "A comprehensive guide for aspiring HCI researchers, covering foundations, empirical research, constructive research, and practical guidance for your first HCI project."
  sections:
    - title: "Foundations of HCI Research"
      chapters:
        - "Introduction"
        - "Research Contributions in HCI"
    - title: "Empirical Research"
      chapters:
        - "Introduction to Empirical Research"
        - "The 5-Step Approach to Experiment Design"
    - title: "Constructive Research"
      chapters:
        - "Overview and Interaction Techniques"
        - "System and Toolkits"
    - title: "Other Important Aspects"
      chapters:
        - "Guide to Your First HCI Project"
        - "Literature Reviews"

# Heads-Up Computing
heads-up-computing:
  title: "Heads-Up Computing"
  tagline: "Moving beyond the screen-locked present"
  description: "We explore a world where information is seamlessly integrated into the user's perceptual field, reducing cognitive load and maximizing presence."
  features:
    - title: "Vision Priority"
      description: "Information displayed in the user's field of view"
      icon: "eye"
    - title: "Audio Feedback"
      description: "Spatial audio cues for notifications and alerts"
      icon: "audio"

