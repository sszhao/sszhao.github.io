<style>
.site-nav {
  position: sticky; top: 0; z-index: 50;
  height: 80px; width: 100%;
  background: rgba(250,249,246,0.8);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(26,28,26,0.04);
}
.site-nav__inner {
  max-width: 1280px; margin: 0 auto;
  padding: 0 48px;
  height: 100%;
  display: flex; align-items: center; justify-content: space-between;
}
.site-nav__wordmark {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 22px;
  color: #1a1c1a;
  letter-spacing: -0.55px;
  text-decoration: none;
}
.site-nav__links {
  display: flex; gap: 36px;
  align-items: center;
}
.site-nav__link {
  font-family: 'Manrope', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: #6b6576;
  text-decoration: none;
  transition: color 180ms ease;
  position: relative;
  padding: 6px 0;
}
.site-nav__link:hover { color: #1a1c1a; }
.site-nav__link--active {
  color: #7929d8;
  font-weight: 700;
}
.site-nav__link--active::after {
  content: ""; position: absolute;
  left: 0; right: 0; bottom: -2px;
  height: 2px; background: #7929d8;
  border-radius: 1px;
}
.site-nav__cta {
  margin-left: 12px;
  display: flex;
  align-items: center;
  text-decoration: none;
}
.site-nav__cta img {
  height: 40px;
  width: auto;
  border-radius: 8px;
}
</style>

<nav class="site-nav">
  <div class="site-nav__inner">
    <a class="site-nav__wordmark" href="/">Shengdong Zhao</a>
    <div class="site-nav__links">
      <a class="site-nav__link{% if page.title == 'Home' %} site-nav__link--active{% endif %}" href="/">Home</a>
      <a class="site-nav__link{% if page.title == 'Book' %} site-nav__link--active{% endif %}" href="/book/">Book</a>
      <a class="site-nav__link{% if page.title == 'Heads-Up Computing' %} site-nav__link--active{% endif %}" href="/heads-up-computing/">Heads-Up</a>
      <a class="site-nav__link" href="/research/">Publications</a>
      <a class="site-nav__link{% if page.title == 'Blog' %} site-nav__link--active{% endif %}" href="/blogs/">Blog</a>
      <a class="site-nav__link{% if page.title == 'Join Us' %} site-nav__link--active{% endif %}" href="/join-us/">Join Us</a>
      <a class="site-nav__cta" href="https://www.synteraction.org/" target="_blank" rel="noopener">
        <img src="/assets/synteraction-logo.jpeg" alt="Synteraction Lab">
      </a>
    </div>
  </div>
</nav>
