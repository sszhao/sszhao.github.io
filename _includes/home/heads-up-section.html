<!-- Heads-Up Computing Section -->
<section class="heads-up-section">
  <div class="container">
    <div class="heads-up-section__container">
      <div class="heads-up-section__content">
        <div class="heads-up-section__badge">Core Initiative</div>

        <h2 class="heads-up-section__title">Heads-Up<br>Computing</h2>
        <p class="heads-up-section__description">
          Moving beyond the screen-locked present. We explore a world where information is seamlessly integrated into the user's perceptual field, reducing cognitive load and maximizing presence.
        </p>
        <a href="/heads-up-computing" class="heads-up-section__link">Find Out More →</a>
      </div>

      <div class="heads-up-section__video-wrapper">
        <div class="heads-up-section__video-container">
          <video
            id="heads-up-video-mp4"
            src="https://synteraction.org/assets/images/hci-video.mp4"
            poster="/assets/img/heads-up-lab-vision-poster.png"
            controls
            playsinline
            preload="auto"
            class="video-player active"
          >
            Your browser does not support the video tag.
          </video>
          <video
            id="heads-up-video-cacm"
            src="/assets/videos/cacm-video.mp4"
            poster="/assets/img/Heads-up-video-image.png"
            controls
            playsinline
            preload="auto"
            class="video-player"
          >
            Your browser does not support the video tag.
          </video>
        </div>
        <div class="heads-up-section__video-links">
          <button class="heads-up-section__video-btn heads-up-section__video-btn--active" data-video="mp4">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 0L9.5 6H16L10.5 9.5L12.5 16L8 12L3.5 16L5.5 9.5L0 6H6.5L8 0Z" fill="#7929d8"/>
            </svg>
            Lab's Vision
          </button>
          <button class="heads-up-section__video-btn" data-video="cacm">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 0L9.5 6H16L10.5 9.5L12.5 16L8 12L3.5 16L5.5 9.5L0 6H6.5L8 0Z" fill="#7929d8"/>
            </svg>
            CACM Video
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<style>
.heads-up-section {
  padding: var(--section-padding) 0;
  background: var(--color-bg-lighter);
}

.heads-up-section__container {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-4xl);
  align-items: center;
}

@media (min-width: 1024px) {
  .heads-up-section__container {
    grid-template-columns: 1fr 1fr;
    gap: var(--space-6xl);
  }
}

.heads-up-section__content {
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
}

.heads-up-section__badge {
  display: inline-flex;
  align-self: flex-start;
  background: rgba(255, 224, 135, 0.3);
  font-family: var(--font-heading);
  font-size: 12px;
  font-weight: var(--font-weight-bold);
  color: #735c00;
  padding: 4px 12px;
  border-radius: 12px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

.heads-up-section__title {
  font-family: var(--font-heading);
  font-size: var(--font-size-h1);
  font-weight: var(--font-weight-bold);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}

.heads-up-section__description {
  font-family: var(--font-body);
  font-size: var(--font-size-body);
  line-height: var(--line-height-body);
  color: var(--color-text-secondary);
  max-width: 480px;
}

.heads-up-section__video-wrapper {
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.heads-up-section__video-container {
  position: relative;
  border-radius: var(--radius-xl);
  overflow: hidden;
  background: #000;
  aspect-ratio: 16/9;
}

.video-player {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  opacity: 0;
  z-index: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.video-player.active {
  opacity: 1;
  z-index: 1;
  pointer-events: auto;
}

.heads-up-section__video-links {
  display: flex;
  gap: var(--space-lg);
  flex-wrap: wrap;
}

.heads-up-section__video-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
  font-family: var(--font-heading);
  font-size: 14px;
  font-weight: var(--font-weight-semibold);
  color: var(--color-text-secondary);
  text-decoration: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  transition: color 0.2s ease;
}

.heads-up-section__video-btn:hover {
  color: var(--color-primary);
}

.heads-up-section__video-btn--active {
  color: var(--color-primary);
}

.heads-up-section__link {
  font-family: var(--font-heading);
  font-size: 14px;
  font-weight: var(--font-weight-semibold);
  color: var(--color-primary);
  text-decoration: none;
  transition: opacity 0.2s ease;
}

.heads-up-section__link:hover {
  opacity: 0.8;
}
</style>


<script>
document.addEventListener('DOMContentLoaded', function() {
  var videoBtns = document.querySelectorAll('.heads-up-section__video-btn');
  var visionVideo = document.getElementById('heads-up-video-mp4');
  var cacmVideo = document.getElementById('heads-up-video-cacm');

  videoBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var videoType = this.getAttribute('data-video');
      videoBtns.forEach(function(b) {
        b.classList.remove('heads-up-section__video-btn--active');
      });
      this.classList.add('heads-up-section__video-btn--active');
      if (videoType === 'cacm') {
        visionVideo.classList.remove('active');
        visionVideo.pause();
        cacmVideo.classList.add('active');
      } else {
        cacmVideo.classList.remove('active');
        cacmVideo.pause();
        visionVideo.classList.add('active');
      }
    });
  });
});
</script>
